<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>3D Digital Art Museum</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- Virtual Joystick Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <!-- Three.js Import Map -->
    <!-- We need standard Three.js and the @pixiv/three-vrm library for VRM avatars -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js"
            }
        }
    </script>
</head>

<body>
    <div id="ui-container">
        <!-- Device Selection Screen -->
        <div id="device-selection" class="glass-panel">
            <h1 class="gradient-text">Virtual Museum</h1>
            <p class="subtitle">Select your device to enter.</p>
            <div class="device-buttons">
                <button id="btn-pc" class="btn btn-primary">Play on PC (Keyboard & Mouse)</button>
                <button id="btn-mobile" class="btn btn-secondary">Play on Mobile (Touch)</button>
            </div>
        </div>

        <!-- PC Instructions (Hidden Initially) -->
        <div id="instructions-pc" class="glass-panel" style="display: none;">
            <h1 class="gradient-text">Virtual Museum</h1>
            <p><strong>Click to enter the space</strong></p>
            <div class="controls-hint">
                <span>W, A, S, D</span> to Move <br>
                <span>Mouse</span> to Look <br>
                <span>Esc</span> to Exit
            </div>
        </div>
    </div>

    <div id="crosshair" style="display: none;">+</div>

    <!-- Mobile UI Elements (Hidden Initially) -->
    <div id="mobile-ui" style="display: none;">
        <!-- The zone where the joystick will appear -->
        <div id="joystick-zone"></div>
        <!-- Right side touch area for looking around -->
        <div id="look-zone"></div>
        <button id="btn-exit-mobile">Exit</button>
    </div>

    <!-- Main Module Script -->
    <script type="module" src="script.js"></script>
</body>

</html>
